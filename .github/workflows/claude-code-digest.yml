name: Daily AI Digest (Claude Code)

on:
  schedule:
    # 23:00 UTC = 07:00 AM Malaysia time (UTC+8) the next day
    - cron: '0 23 * * *'
  workflow_dispatch:  # lets you trigger it manually from the Actions tab, for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Run Claude Code research
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are the frontliner to the AI office. Research and discover global
            and local (Malaysia) AI related news for the past 7 days. Also note
            2-3 notable trending AI tools/repos on GitHub right now.

            Write your final digest as plain text to a file named digest_output.txt
            in the current working directory. Format it as a concise Telegram
            message: short bullet points, source names in brackets, no markdown
            headers, plain readable text, under 3500 characters total. Do not
            include anything else in the file besides the digest text itself.
          claude_args: |
            --allowedTools "Read,Write,WebSearch"
            --max-turns 15

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BODY=$(cat digest_output.txt)
          FULL_MESSAGE=$(printf '🌅 Daily AI Digest (Claude Code research)\n\n%s' "$BODY")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${FULL_MESSAGE}" \
            -d disable_web_page_preview=true
