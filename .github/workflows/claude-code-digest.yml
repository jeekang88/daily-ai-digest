name: Daily AI Digest (Claude Code)

on:
  schedule:
    # 23:00 UTC = 07:00 AM Malaysia time (UTC+8) the next day
    - cron: '0 23 * * *'
  workflow_dispatch:  # lets you trigger it manually from the Actions tab, for testing

jobs:
  send-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Run Claude Code research
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Write the text "Digest test successful" to a file named digest_output.txt
            in the current working directory. Do nothing else.
          claude_args: |
            --max-turns 5

      - name: Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BODY=$(cat digest_output.txt)
          FULL_MESSAGE=$(printf '🌅 Daily AI Digest (Claude Code research)\n\n%s' "$BODY")
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${FULL_MESSAGE}" \
            -d disable_web_page_preview=true
